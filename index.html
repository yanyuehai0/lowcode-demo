<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="低代码编辑器 Demo" />
    <meta name="keywords" content="低代码, lowcode, 编辑器, React" />
    <title>低代码编辑器 - Lowcode Demo</title>

    <!-- DNS 预解析，加速 CDN 资源加载 -->
    <link rel="dns-prefetch" href="//g.alicdn.com" />
    <link rel="dns-prefetch" href="//alifd.alicdn.com" />
    <link rel="dns-prefetch" href="//uipaas-assets.com" />

    <!-- ==============================================
                      样式资源区域
         ============================================== -->

    <!-- Fusion UI 主题样式 (可切换为 theme-lowcode-dark 使用暗色主题) -->
    <link
      href="https://alifd.alicdn.com/npm/@alifd/theme-lowcode-light@0.2.1/variables.css"
      rel="stylesheet"
    />
    <link
      href="https://alifd.alicdn.com/npm/@alifd/theme-lowcode-light@0.2.1/dist/next.var.min.css"
      rel="stylesheet"
    />

    <!-- 低代码引擎核心样式 -->
    <link
      rel="stylesheet"
      href="https://uipaas-assets.com/prod/npm/@alilc/lowcode-engine/1.3.3-beta.0/dist/css/engine-core.css"
    />

    <!-- 低代码引擎扩展样式 -->
    <link
      rel="stylesheet"
      href="https://uipaas-assets.com/prod/npm/@alilc/lowcode-engine-ext/1.0.6/dist/css/engine-ext.css"
    />

    <!-- 预加载全局依赖 (Vite 打包的模块) -->
    <script type="module" src="/src/preload.ts"></script>

    <!-- 等待全局变量就绪后加载低代码引擎 -->
    <script type="module">
      // 确保全局依赖已准备好
      function waitForGlobals() {
        return new Promise((resolve) => {
          const check = () => {
            if (window._ && window.moment && window.React && window.ReactDOM) {
              resolve();
            } else {
              setTimeout(check, 20);
            }
          };
          check();
        });
      }

      // 动态加载脚本
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.crossOrigin = "anonymous";
          script.onload = () => resolve();
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      // 按顺序初始化
      try {
        console.log(window.AliLowCodeEngine);

        await waitForGlobals();
        console.log("load waitForGlobals");

        await loadScript(
          "https://g.alicdn.com/code/lib/prop-types/15.7.2/prop-types.js",
        );
        console.log("load prop-types");

        await loadScript(
          "https://g.alicdn.com/code/lib/alifd__next/1.24.18/next.min.js",
        );
        console.log("load alifd__next");

        await loadScript(
          "https://uipaas-assets.com/prod/npm/@alilc/lowcode-engine/1.3.3-beta.0/dist/js/engine-core.js",
        );
        console.log("load engine-core");

        await loadScript(
          "https://uipaas-assets.com/prod/npm/@alilc/lowcode-engine-ext/1.0.6/dist/js/engine-ext.js",
        );
        console.log("load engine-ext");

        window.dispatchEvent(new CustomEvent("lowcode-engine-ready"));
        console.log("All dependencies loaded successfully!");
      } catch (e) {
        console.error("Failed to load dependencies:", e);
      }
    </script>
  </head>
  <body>
    <!-- 应用根容器 -->
    <div id="root"></div>

    <!-- Vite 应用入口 -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
